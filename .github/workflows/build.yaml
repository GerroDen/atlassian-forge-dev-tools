name: Build
on:
  push:
    branches: ["main"]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: yarn
      - run: yarn lint
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Auto tag
        uses: butlerlogic/action-autotag@1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: yarn
      - run: yarn build
      - name: Archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: atlassian-forge-dev-tools
          path: dist/**/*
